name: KalsinApp
description: "KalsınApp – Loud Budgeting & No-Spend tracker for Turkish Gen Z"
publish_to: 'none'
version: 1.2.0+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI & Theming
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Ads
  google_mobile_ads: ^5.3.0

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Share & Export
  share_plus: ^10.0.0
  path_provider: ^2.1.4
  screenshot: ^3.0.0

  # Confetti
  confetti: ^0.7.0

  # Home Screen Widget
  home_widget: ^0.7.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/Logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
  fonts:
    []
